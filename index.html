<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>I ❤ F1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E10600;
  --bg: #0d0d0d;
  --surface: #181818;
  --surface2: #222;
  --border: #2c2c2c;
  --text: #f0f0f0;
  --muted: #666;
  --tab-h: 62px;
  --header-h: 60px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-text-size-adjust: 100%;
}
/* HEADER */
header {
  height: var(--header-h);
  background: #080808;
  border-bottom: 2px solid var(--red);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  flex-shrink: 0;
  z-index: 10;
}
.logo { display: flex; align-items: center; gap: 0; }
.logo-img { height: 38px; width: auto; display: block; }
.f1-badge {
  background: var(--red);
  color: #fff;
  font-weight: 900;
  font-size: 20px;
  letter-spacing: -1px;
  padding: 3px 12px 3px 8px;
  clip-path: polygon(0 0, 90% 0, 100% 50%, 90% 100%, 0 100%);
}
.logo-sub { font-size: 15px; font-weight: 700; letter-spacing: 3px; color: var(--text); }
.session-status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); letter-spacing: .5px; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: blink 1.1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
/* TABS */
nav.tabs {
  height: var(--tab-h);
  background: #080808;
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
  order: 99;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  border: none; background: none; color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: color .2s; -webkit-tap-highlight-color: transparent; border-top: 2px solid transparent;
}
.tab.active { color: var(--red); border-top-color: var(--red); }
.tab svg { width: 20px; height: 20px; }
/* CONTENT */
.content { flex: 1; overflow: hidden; position: relative; }
.pane { display: none; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 12px 8px; }
.pane.active { display: block; }
::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
/* SHARED */
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 60px 20px; color: var(--muted); font-size: 13px; }
.error-box { background: #1c0000; border: 1px solid #3a0000; border-radius: 6px; padding: 14px; color: #ff7070; font-size: 14px; text-align: center; margin: 12px 0; }
.section-hd { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin: 4px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
/* SESSION BANNER */
.session-banner {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 11px 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
}
.session-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 2px; }
.session-name { font-size: 19px; font-weight: 700; }
.session-right { text-align: right; }
.lap-big { font-family: 'Share Tech Mono', monospace; font-size: 26px; color: var(--red); line-height: 1; }
.lap-lbl { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
/* LIVE TABLE */
.timing-tbl { width: 100%; border-collapse: collapse; }
.timing-tbl th { font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; padding: 4px 5px; text-align: right; }
.timing-tbl th:first-child, .timing-tbl th:nth-child(2) { text-align: left; }
.timing-tbl td { padding: 8px 5px; border-bottom: 1px solid var(--border); vertical-align: middle; text-align: right; }
.timing-tbl td:first-child { text-align: left; font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--muted); width: 28px; }
.timing-tbl td:nth-child(2) { text-align: left; }
.drv-code { font-size: 17px; font-weight: 700; letter-spacing: .5px; display: block; }
.drv-full { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }
.mono { font-family: 'Share Tech Mono', monospace; font-size: 13px; }
.gap-leader { color: var(--muted); }
.interval { color: #60a5fa; }
.fastest-lap { color: #a855f7; }
.tyre-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%; font-size: 9px; font-weight: 900; color: #000;
}
.tyre-SOFT { background: #e10600; }
.tyre-MEDIUM { background: #f5d800; }
.tyre-HARD { background: #e0e0e0; }
.tyre-INTERMEDIATE { background: #39d353; }
.tyre-WET { background: #0ea5e9; color: #fff; }
/* STANDINGS */
.std-toggle { display: flex; background: var(--surface); border-radius: 6px; padding: 3px; gap: 3px; margin-bottom: 12px; }
.std-btn {
  flex: 1; padding: 8px 0; text-align: center; font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  border: none; border-radius: 4px; cursor: pointer; color: var(--muted); background: none;
  transition: all .18s; -webkit-tap-highlight-color: transparent;
}
.std-btn.active { background: var(--red); color: #fff; }
.std-tbl { width: 100%; border-collapse: collapse; }
.std-tbl th { font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; padding: 4px 6px; text-align: right; }
.std-tbl th:nth-child(2) { text-align: left; }
.std-row { border-left: 3px solid transparent; }
.std-row td { padding: 9px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.std-row td:first-child { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--muted); text-align: center; width: 32px; }
.std-row td:last-child { font-family: 'Share Tech Mono', monospace; font-size: 19px; font-weight: 600; text-align: right; }
.std-row td:nth-last-child(2) { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--muted); text-align: right; }
.std-name { font-size: 17px; font-weight: 700; }
.std-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.color-bar { display: inline-block; width: 3px; height: 32px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
/* SCHEDULE */
.race-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 13px 14px; margin-bottom: 9px; display: flex; gap: 12px; align-items: flex-start;
  border-left: 3px solid var(--border);
}
.race-card.next-race { border-left-color: var(--red); }
.race-card.past { opacity: .55; }
.rnd-badge {
  background: var(--surface2); color: var(--muted); font-family: 'Share Tech Mono', monospace;
  font-size: 15px; padding: 6px 8px; border-radius: 4px; min-width: 38px; text-align: center; flex-shrink: 0;
}
.race-card.next-race .rnd-badge { background: var(--red); color: #fff; }
.race-info { flex: 1; min-width: 0; }
.next-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--red); margin-bottom: 3px; }
.race-name { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.race-circuit { font-size: 12px; color: var(--muted); margin-top: 2px; }
.race-date { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 6px; }
/* NO SESSION – RICH NEXT RACE VIEW */
.ns-page { padding: 12px 12px 20px; }
.ns-hero { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--red); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
.ns-round { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--red); margin-bottom: 4px; }
.ns-racename { font-size: 22px; font-weight: 900; line-height: 1.1; margin-bottom: 4px; }
.ns-circuit { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.ns-countdown { display: flex; align-items: baseline; gap: 8px; margin-top: 2px; }
.ns-days-num { font-family: 'Share Tech Mono', monospace; font-size: 52px; color: var(--red); line-height: 1; font-weight: 400; }
.ns-days-lbl { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--muted); }
.ns-racetime { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--muted); margin-top: 8px; }
.ns-img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 6px; margin-bottom: 12px; display: block; background: var(--surface2); }
.ns-sessions { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
.ns-session { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); gap: 10px; }
.ns-session:last-child { border-bottom: none; }
.ns-session.ns-race { background: #1a0000; }
.ns-stype { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); width: 80px; flex-shrink: 0; text-transform: uppercase; }
.ns-session.ns-race .ns-stype { color: var(--red); }
.ns-sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.ns-session.ns-race .ns-sdot { background: var(--red); }
.ns-stime { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--text); flex: 1; }
.ns-top5 { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.ns-driver { display: flex; align-items: center; padding: 9px 14px; border-bottom: 1px solid var(--border); gap: 10px; }
.ns-driver:last-child { border-bottom: none; }
.ns-dpos { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--muted); width: 18px; text-align: center; flex-shrink: 0; }
.ns-dbar { width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0; }
.ns-dinfo { flex: 1; min-width: 0; }
.ns-dname { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ns-dteam { font-size: 11px; color: var(--muted); margin-top: 1px; }
.ns-dpts { font-family: 'Share Tech Mono', monospace; font-size: 16px; font-weight: 600; color: var(--text); }
.no-session-simple { text-align: center; padding: 48px 24px; }
.no-session-simple h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.no-session-simple p { font-size: 14px; color: var(--muted); }
/* Results table (practice/quali) */
.res-tbl { width: 100%; border-collapse: collapse; }
.res-tbl th { font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; padding: 4px 5px; }
.res-tbl th:first-child { text-align: left; }
.res-tbl th:not(:first-child) { text-align: right; }
.res-row td { padding: 8px 5px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.res-row td:first-child { font-family: 'Share Tech Mono', monospace; font-size: 13px; width: 28px; text-align: left; }
.res-row td:not(:first-child):not(:nth-child(2)) { font-family: 'Share Tech Mono', monospace; font-size: 13px; text-align: right; }
.pos-medal { display: inline-block; width: 22px; height: 22px; border-radius: 4px; text-align: center; line-height: 22px; font-size: 12px; font-weight: 700; font-family: 'Share Tech Mono', monospace; }
.medal-1 { background: #c9a227; color: #000; }
.medal-2 { background: #a0a0a0; color: #000; }
.medal-3 { background: #8b4513; color: #fff; }
</style>
</head>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────

const LIVE_REFRESH_MS   = 5000;

const TEAM_COLORS = {

const CIRCUIT_WIKI = {
  bahrain:'Bahrain_International_Circuit', jeddah:'Jeddah_Street_Circuit',
  albert_park:'Melbourne_Grand_Prix_Circuit', suzuka:'Suzuka_International_Racing_Course',

  imola:'Autodromo_Enzo_e_Dino_Ferrari', monaco:'Circuit_de_Monaco',
  villeneuve:'Circuit_Gilles_Villeneuve', catalunya:'Circuit_de_Barcelona-Catalunya',
  silverstone:'Silverstone_Circuit', hungaroring:'Hungaroring',
  spa:'Circuit_de_Spa-Francorchamps', zandvoort:'Circuit_Zandvoort',
  monza:'Autodromo_Nazionale_Monza', baku:'Baku_City_Circuit',
  marina_bay:'Marina_Bay_Street_Circuit', americas:'Circuit_of_the_Americas',
  rodriguez:'Aut%C3%B3dromo_Hermanos_Rodr%C3%ADguez',
  interlagos:'Aut%C3%B3dromo_Jos%C3%A9_Carlos_Pace',
  las_vegas:'Las_Vegas_Street_Circuit', yas_marina:'Yas_Marina_Circuit',
  losail:'Lusail_International_Circuit', portimao:'Aut%C3%B3dromo_Internacional_do_Algarve',

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  activeTab: 'live',
  standingsTab: 'drivers',
  session: null,
  sessionDrivers: {},    // driver_number → driver obj
  sessionStints: {},     // driver_number → latest stint
  livePositions: {},     // driver_number → latest position
  liveIntervals: {},     // driver_number → latest interval
  liveLaps: {},          // driver_number → { last, best, count }
  driverStandings: null,
  constructorStandings: null,
  schedule: null,
  refreshTimer: null,
  isLive: false,
};

// ─── Tab Switching ────────────────────────────────────────────────────────────
function switchTab(tab) {

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + tab).classList.add('active');

  if (tab === 'standings' && !S.driverStandings) loadStandings();
  if (tab === 'schedule'  && !S.schedule)        loadSchedule();
}

function setStandingsTab(sub) {
  S.standingsTab = sub;
  document.getElementById('btnDrivers').classList.toggle('active', sub === 'drivers');
  document.getElementById('btnConstructors').classList.toggle('active', sub === 'constructors');
  renderStandings();
}

// ─── Fetch helpers ────────────────────────────────────────────────────────────

// JSONP: works from file:// (uses <script> tag, bypasses CORS entirely)
// Used for all Jolpica/Ergast endpoints.
function getJSONP(url, timeoutMs) {
  timeoutMs = timeoutMs || 12000;
  return new Promise(function(resolve, reject) {
    var cbName = '_f1cb' + Date.now() + Math.random().toString(36).slice(2, 7);
    var script = document.createElement('script');
    var done = false;
    var timer = setTimeout(function() {
      if (done) return; done = true;
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
      reject(new Error('JSONP timed out'));
    }, timeoutMs);
    window[cbName] = function(data) {
      if (done) return; done = true;
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
      resolve(data);
    };
    script.onerror = function() {
      if (done) return; done = true;
      clearTimeout(timer);
      delete window[cbName];
      reject(new Error('JSONP script error'));
    };
    var sep = url.indexOf('?') >= 0 ? '&' : '?';
    script.src = url + sep + 'callback=' + cbName;
    document.head.appendChild(script);
  });
}

// Proxy-based fetch: tries direct, then two CORS proxies.
// Used for OpenF1 and Wikipedia (which don't support JSONP).
function get(url, timeoutMs) {
  timeoutMs = timeoutMs || 10000;
  var candidates = [
    url,
    'https://corsproxy.io/?' + encodeURIComponent(url),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url)
  ];
  var lastErr = null;
  function attempt(i) {
    if (i >= candidates.length) {
      return Promise.reject(lastErr || new Error('All ' + candidates.length + ' fetch attempts failed'));
    }
    var target = candidates[i];
    var label = i === 0 ? 'direct' : 'proxy-' + i;
    console.log('[F1] fetch via ' + label);
    var timeoutP = new Promise(function(_, rej) {
      setTimeout(function() { rej(new Error('Timed out (' + timeoutMs/1000 + 's) — tried ' + (i+1) + '/3 routes')); }, timeoutMs);
    });
    var fetchP = fetch(target).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    }).then(function(t) {
      return JSON.parse(t);
    });
    return Promise.race([fetchP, timeoutP]).catch(function(e) {
      lastErr = e;
      return attempt(i + 1);
    });
  }
  return attempt(0);
}

// Jolpica wrapper: tries JSONP first (always works on iPad from file://),
// falls back to proxy fetch if JSONP fails.
function jolpicaGet(url) {
  return getJSONP(url, 12000).catch(function(e) {
    console.warn('[F1] JSONP failed (' + e.message + '), trying proxy…');
    return get(url, 10000);
  });
}

// ─── LIVE TAB ─────────────────────────────────────────────────────────────────
async function loadLive() {
  clearTimeout(S.refreshTimer);
  document.getElementById('pane-live').innerHTML =
    '<div class="loader"><div class="spinner"></div><span id="loadMsg">Connecting to F1 data…</span></div>';
  // Update message after 5s so user knows it's still trying
  var slowTimer = setTimeout(function() {
    var el = document.getElementById('loadMsg');
    if (el) el.textContent = 'Still loading — this can take up to 12 seconds…';
  }, 5000);
  try {
    // Fetch all sessions for current year, take the most recent one
    let sessions = await get(`${OPENF1}/sessions?year=${YEAR}`);
    if (!sessions || !sessions.length) {
      // Fallback: try previous year in case season hasn't started yet
      sessions = await get(`${OPENF1}/sessions?year=${YEAR - 1}`);
    }
    if (!sessions || !sessions.length) throw new Error('No sessions found from OpenF1');
    // Sort by date_start descending, take the most recent
    sessions.sort((a, b) => new Date(b.date_start) - new Date(a.date_start));
    const sess = sessions[0];
    S.session = sess;

    const now = new Date();
    const start = new Date(sess.date_start);
    const end   = sess.date_end ? new Date(sess.date_end) : null;

    S.isLive = end ? (now >= start && now <= end) : (now >= start);
    const isRecent = end ? ((now - end) / 36e5 < RECENT_SESSION_H) : false;

    if (S.isLive || isRecent) {
      clearTimeout(slowTimer);
      await loadSessionData();
    } else {
      clearTimeout(slowTimer);
      renderNoSession();
    }
  } catch(e) {
    clearTimeout(slowTimer);
    document.getElementById('pane-live').innerHTML =
      '<div class="error-box">⚠️ Could not load session data.<br><small style="opacity:.7;word-break:break-all">' + e.message + '</small><br><small style="opacity:.5;margin-top:4px;display:block">Make sure the iPad has internet access, then tap Retry.</small><br><button onclick="loadLive()" style="margin-top:8px;padding:8px 18px;background:var(--red);color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">Retry</button></div>';
  }
}

async function loadSessionData() {
  const key = S.session.session_key;
  try {
    const [drivers, positions, intervals, laps, stints] = await Promise.all([
      get(`${OPENF1}/drivers?session_key=${key}`),
      get(`${OPENF1}/position?session_key=${key}`),
      get(`${OPENF1}/intervals?session_key=${key}`),
      get(`${OPENF1}/laps?session_key=${key}`),
      get(`${OPENF1}/stints?session_key=${key}`).catch(() => []),
    ]);

    // Build driver map
    S.sessionDrivers = {};
    for (const d of drivers) S.sessionDrivers[d.driver_number] = d;

    // Latest position per driver
    S.livePositions = {};
    for (const p of positions) S.livePositions[p.driver_number] = p;

    // Latest interval per driver
    S.liveIntervals = {};
    for (const i of intervals) S.liveIntervals[i.driver_number] = i;

    // Lap stats per driver
    S.liveLaps = {};
    for (const lap of laps) {
      const n = lap.driver_number;
      if (!S.liveLaps[n]) S.liveLaps[n] = { best: null, last: null, count: 0 };
      const d = S.liveLaps[n];
      if (lap.lap_number > d.count) { d.count = lap.lap_number; d.last = lap; }
      if (lap.lap_duration && (!d.best || lap.lap_duration < d.best.lap_duration)) d.best = lap;
    }

    // Latest stint per driver
    S.sessionStints = {};
    for (const st of stints) S.sessionStints[st.driver_number] = st;

    renderLiveSession();
  } catch(e) {
    document.getElementById('pane-live').innerHTML =
      `<div class="error-box">⚠️ Could not load timing data.<br><small style="opacity:.7;word-break:break-all">${e.message}</small><br><br><button onclick="loadLive()" style="margin-top:4px;padding:8px 18px;background:var(--red);color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">Retry</button></div>`;
  }

  // Schedule next refresh
  const delay = S.isLive ? LIVE_REFRESH_MS : IDLE_REFRESH_MS;
  S.refreshTimer = setTimeout(loadSessionData, delay);
}

function renderLiveSession() {
  const sess = S.session;
  const isRace = sess.session_type === 'Race' || sess.session_name === 'Race';

  // Get sorted drivers by position
  const allDriverNums = Object.keys(S.sessionDrivers).map(Number);
  const ranked = allDriverNums
    .filter(n => S.livePositions[n])
    .sort((a, b) => (S.livePositions[a]?.position || 99) - (S.livePositions[b]?.position || 99));

  // Unranked (no position data yet)
  const unranked = allDriverNums.filter(n => !S.livePositions[n]);

  // Total laps (max lap seen)
  const maxLap = Math.max(0, ...Object.values(S.liveLaps).map(l => l.count));

  // Find overall fastest lap
  let fastestDuration = Infinity, fastestDriver = null;
  for (const [n, ls] of Object.entries(S.liveLaps)) {
    if (ls.best && ls.best.lap_duration < fastestDuration) {
      fastestDuration = ls.best.lap_duration;
      fastestDriver = Number(n);
    }
  }

  // Update header
  const headerStatus = document.getElementById('headerStatus');
  if (S.isLive) {
    headerStatus.innerHTML = `<div class="live-dot"></div>${sess.session_name}`;
  } else {
    headerStatus.innerHTML = `<span style="color:#888">${sess.session_name} – Results</span>`;
  }

  // Build timing rows
  let rows = '';
  for (const n of [...ranked, ...unranked]) {
    const drv = S.sessionDrivers[n];
    if (!drv) continue;
    const pos  = S.livePositions[n];
    const intv = S.liveIntervals[n];
    const laps = S.liveLaps[n];
    const stint = S.sessionStints[n];

    const posNum  = pos ? pos.position : '—';
    const color   = drv.team_colour ? `#${drv.team_colour}` : teamColor(drv.team_name);
    const code    = drv.name_acronym || '???';
    const name    = drv.full_name || '';

    const gap     = intv?.gap_to_leader != null
      ? (intv.gap_to_leader === 0 ? 'Leader' : `+${intv.gap_to_leader.toFixed(3)}`)
      : '—';
    const interval = intv?.interval != null
      ? (intv.interval === 0 ? '—' : `+${Number(intv.interval).toFixed(3)}`)
      : '—';

    const lastLap = laps?.last?.lap_duration
      ? fmtLap(laps.last.lap_duration)
      : '—';
    const isFastest = fastestDriver === n;
    const lapClass  = isFastest ? 'mono fastest-lap' : 'mono';

    const lapCount = laps?.count || '—';

    // Tyre
    let tyreHtml = '—';
    if (stint?.compound) {
      const c = stint.compound.toUpperCase();
      tyreHtml = `<span class="tyre-badge tyre-${c}">${c[0]}</span>`;
    }

    rows += `
    <tr class="timing-tbl-row" style="border-left:3px solid ${color}">
      <td>${posNum}</td>
      <td>
        <span class="drv-code" style="color:${color}">${code}</span>
        <span class="drv-full">${name}</span>
      </td>
      <td class="mono gap-leader">${gap}</td>
      ${isRace ? `<td class="mono interval">${interval}</td>` : ''}
      <td class="${lapClass}">${lastLap}</td>
      ${isRace ? `<td>${tyreHtml}</td>` : ''}
      ${isRace ? `<td class="mono">${lapCount}</td>` : ''}
    </tr>`;
  }

  // Session banner
  const lapInfo = isRace && maxLap
    ? `<div class="lap-big">${maxLap}</div><div class="lap-lbl">LAP</div>`
    : '';

  const html = `
    <div class="session-banner">
      <div>
        <div class="session-label">${sess.country_name || ''}</div>
        <div class="session-name">${sess.session_name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${sess.circuit_short_name || ''}</div>
      </div>
      <div class="session-right">${lapInfo}</div>
    </div>
    <table class="timing-tbl">
      <thead>
        <tr>
          <th>P</th>
          <th>Driver</th>
          <th>Gap</th>
          ${isRace ? '<th>Interval</th>' : ''}
          <th>Last Lap</th>
          ${isRace ? '<th>Tyre</th>' : ''}
          ${isRace ? '<th>Lap</th>' : ''}
        </tr>
      </thead>
      <tbody>${rows || '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--muted)">Waiting for data…</td></tr>'}</tbody>
    </table>
    ${!S.isLive ? '<p style="text-align:center;font-size:12px;color:var(--muted);margin-top:12px">Session complete • Final classification</p>' : ''}
  `;

  document.getElementById('pane-live').innerHTML = html;
}

async function renderNoSession() {
  document.getElementById('headerStatus').innerHTML = '<span style="color:var(--muted)">No active session</span>';
  const pane = document.getElementById('pane-live');
  pane.innerHTML = '<div class="loader"><div class="spinner"></div>Loading next race info…</div>';

  // Ensure schedule loaded
  if (!S.schedule) {
    try {
      const data = await jolpicaGet(JOLPICA + '/current.json');
      if (data && data.MRData && data.MRData.RaceTable) {
        S.schedule = data.MRData.RaceTable.Races;
      }
    } catch(e) { console.warn('Schedule load failed:', e.message); }
  }

  // Ensure standings loaded for top 5
  if (!S.driverStandings) {
    try {
      const drv = await jolpicaGet(JOLPICA + '/current/driverStandings.json');
      const list = drv && drv.MRData && drv.MRData.StandingsTable && drv.MRData.StandingsTable.StandingsLists;
      S.driverStandings = (list && list.length) ? list[0].DriverStandings : [];
      const con = await jolpicaGet(JOLPICA + '/current/constructorStandings.json');
      const clist = con && con.MRData && con.MRData.StandingsTable && con.MRData.StandingsTable.StandingsLists;
      S.constructorStandings = (clist && clist.length) ? clist[0].ConstructorStandings : [];
    } catch(e) { console.warn('Standings load failed:', e.message); }
  }

  const nextRace = findNextRace(S.schedule || []);
  if (!nextRace) {
    pane.innerHTML = '<div class="no-session-simple"><h3>🏁 Season Complete</h3><p>No upcoming races scheduled.</p></div>';
    return;
  }

  // Countdown
  const now = new Date();
  const raceUTC = new Date(nextRace.date + 'T' + (nextRace.time || '12:00:00Z'));
  const msLeft = raceUTC - now;
  const daysLeft = Math.floor(msLeft / 864e5);
  const hoursLeft = Math.floor((msLeft % 864e5) / 36e5);

  let countdownStr;
  if (msLeft <= 0) countdownStr = 'TODAY';
  else if (daysLeft === 0) countdownStr = hoursLeft + 'h';
  else countdownStr = daysLeft;
  const countdownLabel = msLeft <= 0 ? '' : (daysLeft === 0 ? 'HOURS TO GO' : 'DAYS TO GO');

  // Sessions
  const sessionDefs = [
    { key:'FirstPractice',    label:'Practice 1' },
    { key:'SecondPractice',   label:'Practice 2' },
    { key:'ThirdPractice',    label:'Practice 3' },
    { key:'SprintQualifying', label:'Sprint Shootout' },
    { key:'Sprint',           label:'Sprint Race' },
    { key:'Qualifying',       label:'Qualifying' },
  ];
  const sessions = [];
  for (const def of sessionDefs) {
    if (nextRace[def.key] && nextRace[def.key].date) {
      sessions.push({ label: def.label, date: nextRace[def.key].date, time: nextRace[def.key].time });
    }
  }
  sessions.push({ label: 'Race', date: nextRace.date, time: nextRace.time, isRace: true });

  // Session rows HTML
  const sessionRows = sessions.map(s => {
    const cls = s.isRace ? 'ns-session ns-race' : 'ns-session';
    return '<div class="' + cls + '">' +
      '<div class="ns-stype">' + s.label + '</div>' +
      '<div class="ns-sdot"></div>' +
      '<div class="ns-stime">' + fmtLocalTime(s.date, s.time) + '</div>' +
      '</div>';
  }).join('');

  // Top 5 HTML
  let top5Html = '';
  const standings = S.driverStandings || [];
  const top5 = standings.slice(0, 5);
  if (top5.length) {
    const driverRows = top5.map(s => {
      const conId = s.Constructors && s.Constructors[0] ? s.Constructors[0].constructorId : '';
      const color = teamColor(conId);
      return '<div class="ns-driver">' +
        '<div class="ns-dpos">' + s.position + '</div>' +
        '<div class="ns-dbar" style="background:' + color + '"></div>' +
        '<div class="ns-dinfo">' +
          '<div class="ns-dname">' + s.Driver.givenName + ' ' + s.Driver.familyName + '</div>' +
          '<div class="ns-dteam">' + (s.Constructors && s.Constructors[0] ? s.Constructors[0].name : '') + '</div>' +
        '</div>' +
        '<div class="ns-dpts">' + s.points + '</div>' +
        '</div>';
    }).join('');
    top5Html = '<div class="section-hd" style="margin-top:14px">Championship — Top 5</div>' +
      '<div class="ns-top5">' + driverRows + '</div>';
  }

  // Render without image first (fast)
  const circuit = nextRace.Circuit || {};
  const loc = circuit.Location || {};
  const circuitLine = [circuit.circuitName, loc.locality, loc.country].filter(Boolean).join(' · ');

  pane.innerHTML =
    '<div class="ns-page">' +
      '<div class="ns-hero">' +
        '<div class="ns-round">ROUND ' + nextRace.round + ' · ' + nextRace.season + '</div>' +
        '<div class="ns-racename">' + nextRace.raceName + '</div>' +
        '<div class="ns-circuit">' + circuitLine + '</div>' +
        '<div class="ns-countdown">' +
          '<div class="ns-days-num">' + countdownStr + '</div>' +
          (countdownLabel ? '<div class="ns-days-lbl">' + countdownLabel + '</div>' : '') +
        '</div>' +
        '<div class="ns-racetime">Race: ' + fmtLocalTime(nextRace.date, nextRace.time) + '</div>' +
      '</div>' +
      '<div id="ns-img-slot"></div>' +
      '<div class="section-hd">Weekend Schedule</div>' +
      '<div class="ns-sessions">' + sessionRows + '</div>' +
      top5Html +
    '</div>';

  // Try to fetch circuit image from Wikipedia (async, inject when ready)
  const wikiKey = circuit.circuitId ? CIRCUIT_WIKI[circuit.circuitId] : null;
  if (wikiKey) {
    try {
      const wikiData = await get('https://en.wikipedia.org/api/rest_v1/page/summary/' + wikiKey);
      const imgSrc = wikiData && wikiData.thumbnail && wikiData.thumbnail.source;
      const slot = document.getElementById('ns-img-slot');
      if (imgSrc && slot) {
        slot.innerHTML = '<img class="ns-img" src="' + imgSrc + '" alt="' + (circuit.circuitName || 'Circuit') + '" onerror="this.style.display=\'none\'">';
      }
    } catch(e) { console.warn('Circuit image fetch failed:', e.message); }
  }
}

// ─── STANDINGS ────────────────────────────────────────────────────────────────
async function loadStandings() {
  try {
    const [drv, con] = await Promise.all([
      jolpicaGet(`${JOLPICA}/current/driverStandings.json`),
      jolpicaGet(`${JOLPICA}/current/constructorStandings.json`),
    ]);
    const drvList = drv?.MRData?.StandingsTable?.StandingsLists;
    const conList = con?.MRData?.StandingsTable?.StandingsLists;
    S.driverStandings      = (drvList && drvList.length) ? drvList[0].DriverStandings     : [];
    S.constructorStandings = (conList && conList.length) ? conList[0].ConstructorStandings : [];
    if (!S.driverStandings.length) {
      document.getElementById('standingsContent').innerHTML =
        '<p style="color:var(--muted);text-align:center;padding:40px 20px;font-size:14px">No standings data yet for this season.<br>Check back after the first race.</p>';
      return;
    }
    renderStandings();
  } catch(e) {
    document.getElementById('standingsContent').innerHTML =
      `<div class="error-box">⚠️ Could not load standings.<br><small style="opacity:.7;word-break:break-all">${e.message}</small><br><br><button onclick="S.driverStandings=null;loadStandings()" style="margin-top:4px;padding:8px 18px;background:var(--red);color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">Retry</button></div>`;
  }
}

function renderStandings() {
  const el = document.getElementById('standingsContent');
  if (!S.driverStandings) { el.innerHTML = '<div class="loader"><div class="spinner"></div>Loading…</div>'; return; }

  if (S.standingsTab === 'drivers') {
    let rows = '';
    for (const s of S.driverStandings) {
      const conId = s.Constructors?.[0]?.constructorId || '';
      const color = teamColor(conId);
      const pos   = Number(s.position);
      rows += `
        <tr class="std-row" style="border-left-color:${color}">
          <td>${pos}</td>
          <td>
            <span style="display:inline-block;width:3px;height:30px;background:${color};border-radius:2px;vertical-align:middle;margin-right:8px"></span>
            <span class="std-name">${s.Driver.givenName} ${s.Driver.familyName}</span>
            <div class="std-sub" style="padding-left:11px">${s.Constructors?.[0]?.name || ''}</div>
          </td>
          <td>${s.wins}</td>
          <td>${s.points}</td>
        </tr>`;
    }
    el.innerHTML = `
      <table class="std-tbl">
        <thead><tr><th>P</th><th>Driver</th><th>Wins</th><th>PTS</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else {
    let rows = '';
    for (const s of S.constructorStandings) {
      const color = teamColor(s.Constructor.constructorId);
      rows += `
        <tr class="std-row" style="border-left-color:${color}">
          <td>${s.position}</td>
          <td>
            <span style="display:inline-block;width:3px;height:24px;background:${color};border-radius:2px;vertical-align:middle;margin-right:8px"></span>
            <span class="std-name">${s.Constructor.name}</span>
          </td>
          <td>${s.wins}</td>
          <td>${s.points}</td>
        </tr>`;
    }
    el.innerHTML = `
      <table class="std-tbl">
        <thead><tr><th>P</th><th>Team</th><th>Wins</th><th>PTS</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }
}

// ─── SCHEDULE ─────────────────────────────────────────────────────────────────
async function loadSchedule() {
  try {
    const data = await jolpicaGet(`${JOLPICA}/current.json`);
    S.schedule = data.MRData.RaceTable.Races;
    renderSchedule();
  } catch(e) {
    document.getElementById('scheduleContent').innerHTML =
      `<div class="error-box">⚠️ Could not load schedule.<br><small style="opacity:.7;word-break:break-all">${e.message}</small><br><br><button onclick="S.schedule=null;loadSchedule()" style="margin-top:4px;padding:8px 18px;background:var(--red);color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">Retry</button></div>`;
  }
}

function renderSchedule() {
  const el = document.getElementById('scheduleContent');
  if (!S.schedule) return;

  const now = new Date();
  let foundNext = false;
  let html = '';

  for (const race of S.schedule) {
    const raceDate = new Date(race.date + (race.time ? 'T' + race.time : 'T00:00:00Z'));
    const isPast   = raceDate < now;
    const isNext   = !isPast && !foundNext;
    if (isNext) foundNext = true;

    const classes = ['race-card', isPast ? 'past' : '', isNext ? 'next-race' : ''].filter(Boolean).join(' ');

    html += `
      <div class="${classes}">
        <div class="rnd-badge">${race.round}</div>
        <div class="race-info">
          ${isNext ? '<div class="next-lbl">NEXT RACE</div>' : ''}
          <div class="race-name">${race.raceName}</div>
          <div class="race-circuit">${race.Circuit?.circuitName || ''} · ${race.Circuit?.Location?.country || ''}</div>
          <div class="race-date">${fmtDate(race.date)}</div>
        </div>
      </div>`;
  }

  el.innerHTML = html || '<p style="color:var(--muted);text-align:center;padding:30px">No races found</p>';
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function fmtLap(secs) {
  if (secs == null || isNaN(secs)) return '—';
  const m  = Math.floor(secs / 60);
  const s  = secs % 60;
  const ss = s.toFixed(3).padStart(6, '0');
  return m > 0 ? `${m}:${ss}` : `${ss}`;
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function fmtLocalTime(dateStr, timeStr) {
  if (!dateStr) return '—';
  const dt = new Date(dateStr + 'T' + (timeStr || '12:00:00Z'));
  const day  = dt.toLocaleDateString(undefined, { weekday:'short', day:'numeric', month:'short' });
  const time = dt.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  return day + ' · ' + time;
}

function findNextRace(races) {
  const now = new Date();
  return races.find(r => new Date(r.date + 'T00:00:00Z') >= now);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
document.querySelector('.section-hd').textContent = YEAR + ' Season Calendar';
loadLive();

// Preload schedule in background (needed for "no session" view)
jolpicaGet(`${JOLPICA}/current.json`)
  .then(data => { 
    if (data?.MRData?.RaceTable?.Races) {
      S.schedule = data.MRData.RaceTable.Races; 
      renderSchedule(); 
    }
  })
  .catch(() => {});
</script>
